<!DOCTYPE html>
<html>
<head>
    <title>Mi página web</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0f172a;
            color: white;
        }

        header {
            background-color: #020617;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #1e293b;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: #38bdf8;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        button {
            padding: 12px 25px;
            background-color: #38bdf8;
            border: none;
            color: black;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
        }

        footer {
            background-color: #020617;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Mi Página Web 🚀</h1>
    <p>Creada por mí</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Contacto</a>
</nav>

<section>
    <h2>Bienvenido</h2>
    <p>Esta es mi primera página web profesional 😎</p>
    <button onclick="saludar()">Haz clic aquí</button>
</section>

<footer>
    <p>© 2026 - Mi página</p>
</footer>

<script>
    function saludar() {
        alert("🔥 ¡Ya tienes tu web en internet!");
    }
</script>

</body>
</html>
