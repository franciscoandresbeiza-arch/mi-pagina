<!DOCTYPE html>
<html>
<head>
    <title>Mi página web</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            background: #020617;
            padding: 20px;
        }

        nav {
            background: #1e293b;
            padding: 10px;
        }

        nav a {
            color: #38bdf8;
            margin: 0 15px;
            text-decoration: none;
        }

        section {
            padding: 40px;
        }

        img {
            width: 200px;
            border-radius: 10px;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            background: #020617;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Mi Página 🚀</h1>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#contacto">Contacto</a>
</nav>

<section>
    <h2>Sobre mí</h2>
    <p>Estoy aprendiendo a crear páginas web 🔥</p>

    <img src="https://via.placeholder.com/200" alt="imagen">

    <br><br>
    <button onclick="saludar()">Haz clic</button>
</section>

<section id="contacto">
    <h2>Contacto</h2>
    <p>Sígueme en redes:</p>
    <a href="#">Instagram</a> |
    <a href="#">Facebook</a>
</section>

<footer>
    <p>© 2026</p>
</footer>

<script>
function saludar() {
    alert("🔥 Ya estás subiendo de nivel");
}
</script>

</body>
</html>
