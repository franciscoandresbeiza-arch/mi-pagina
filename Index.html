<!DOCTYPE html>
<html>
<head>
    <title>Mi primera página</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
        }
        button {
            padding: 10px 20px;
            background-color: #38bdf8;
            border: none;
            color: black;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Mi primera página web</h1>
    <p>Estoy aprendiendo desde cero 🚀</p>

    <button onclick="saludar()">Haz clic aquí</button>

    <script>
        function saludar() {
            alert("Hola! Esta es tu primera página web 😎");
        }
    </script>

</body>
</html>
